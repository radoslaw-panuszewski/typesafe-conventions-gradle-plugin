name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      no-build-cache:
        description: 'No build cache'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        gradle-version: ["8.8", "8.9", "8.10", "8.11", "8.12", "8.13", "8.14", "9.0.0", "9.1.0", "9.2.0", "9.3.0", "9.4.0", "9.5.0"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - run: ./gradlew check
        if: github.event.inputs.no-build-cache == 'false'
        env:
          GRADLE_VERSION_TO_TEST: ${{ matrix.gradle-version }}

      - run: ./gradlew check --no-build-cache
        if: github.event.inputs.no-build-cache == 'true'
        env:
          GRADLE_VERSION_TO_TEST: ${{ matrix.gradle-version }}

  automerge-dependabot:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: allegro-actions/dependabot-automerge@v1
